# =========================================================================
# OpenTelemetry Collector — Auth stack (Tempo / Loki / Prometheus / Grafana)
# =========================================================================
# Pipelines:
#   traces  -> tail-sampled -> Tempo (OTLP/gRPC)
#   metrics -> Prometheus (pull) + optional remote-write
#   logs    -> Loki (via otlphttp)
# =========================================================================

extensions:
  # Liveness / readiness for docker-compose health checks
  health_check:
    endpoint: 0.0.0.0:13133
    path: /health
    check_collector_pipeline:
      enabled: true
      interval: 5m
      exporter_failure_threshold: 5

  # On-demand profiling — safe to leave on, only bound to loopback
  pprof:
    endpoint: 127.0.0.1:1777

  # Live pipeline debugging at http://localhost:55679/debug/tracez
  zpages:
    endpoint: 0.0.0.0:55679

# -------------------------------------------------------------------------
# RECEIVERS
# -------------------------------------------------------------------------
receivers:
  # Primary OTLP intake from auth-api and any other instrumented service
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 16
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://localhost:*"

  # Scrape the collector's own internal metrics so Grafana sees pipeline health
  prometheus/self:
    config:
      scrape_configs:
        - job_name: otel-collector
          scrape_interval: 15s
          static_configs:
            - targets: ["0.0.0.0:8888"]

# -------------------------------------------------------------------------
# PROCESSORS  (order matters — memory_limiter MUST be first)
# -------------------------------------------------------------------------
processors:
  # 1) Back-pressure: refuses new data before the collector OOMs
  memory_limiter:
    check_interval: 2s
    limit_percentage: 80
    spike_limit_percentage: 20

  # 2) Resource enrichment — stamps every signal with environment context
  resource:
    attributes:
      - key: deployment.environment
        value: ${env:DEPLOY_ENV}   # e.g. "dev", "staging", "prod"
        action: upsert
      - key: service.namespace
        value: authentication
        action: upsert
      - key: collector.hostname
        value: ${env:HOSTNAME}
        action: upsert
      - key: collector.version
        value: ${env:OTEL_COL_VERSION}
        action: insert

  # 3) Attribute cleanup — drop noisy/PII fields, normalize casing
  attributes/scrub:
    actions:
      - key: http.request.header.authorization
        action: delete
      - key: http.request.header.cookie
        action: delete
      - key: http.response.header.set-cookie
        action: delete

  # 4) Detect container / host attributes automatically (docker, system)
  resourcedetection:
    detectors: [env, system, docker]
    timeout: 5s
    override: false

  # 5) Trace-level shaping — drop health checks & readiness probes
  filter/traces:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.route"] == "/health"'
        - 'attributes["http.route"] == "/ready"'
        - 'attributes["http.route"] == "/metrics"'
        - 'IsMatch(name, ".*HealthCheck.*")'

  # 6) Tail sampling — keep all errors + slow requests, sample the rest
  tail_sampling:
    decision_wait: 10s
    num_traces: 50000
    expected_new_traces_per_sec: 200
    policies:
      - name: errors-always
        type: status_code
        status_code: { status_codes: [ERROR] }
      - name: slow-requests
        type: latency
        latency: { threshold_ms: 500 }
      - name: auth-critical-routes
        type: string_attribute
        string_attribute:
          key: http.route
          values: ["/login", "/token", "/register", "/refresh"]
      - name: probabilistic-baseline
        type: probabilistic
        probabilistic: { sampling_percentage: 10 }

  # 7) Metrics hygiene — drop internal Go runtime noise if you don't need it
  filter/metrics:
    error_mode: ignore
    metrics:
      metric:
        - 'IsMatch(name, "process_runtime_dotnet_gc_collections_count") and resource.attributes["service.name"] == "unknown_service"'

  # 8) Batching — final step before exporters, dramatically improves throughput
  batch:
    send_batch_size: 8192
    send_batch_max_size: 10000
    timeout: 5s

# -------------------------------------------------------------------------
# EXPORTERS
# -------------------------------------------------------------------------
exporters:
  # ---- Tempo (traces) ----
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 5000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m

  # ---- Loki (logs) via native OTLP HTTP ingest ----
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 5000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m

  # ---- Prometheus (metrics) — pull model ----
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otel
    send_timestamps: true
    metric_expiration: 5m
    enable_open_metrics: true
    resource_to_telemetry_conversion:
      enabled: true             # promote resource attrs to labels

  # ---- Dev-only stdout exporter, verbose=basic keeps logs readable ----
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

# -------------------------------------------------------------------------
# SERVICE  (pipelines wire receivers -> processors -> exporters)
# -------------------------------------------------------------------------
service:
  extensions: [health_check, pprof, zpages]

  # Collector's own telemetry — scraped by prometheus/self above
  telemetry:
    logs:
      level: info               # flip to "debug" only when troubleshooting
      encoding: json
      output_paths: ["stdout"]
      error_output_paths: ["stderr"]
    metrics:
      level: detailed
      address: 0.0.0.0:8888

  pipelines:
    traces:
      receivers: [otlp]
      processors:
        - memory_limiter
        - resourcedetection
        - resource
        - attributes/scrub
        - filter/traces
        - tail_sampling
        - batch
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp, prometheus/self]
      processors:
        - memory_limiter
        - resourcedetection
        - resource
        - filter/metrics
        - batch
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors:
        - memory_limiter
        - resourcedetection
        - resource
        - attributes/scrub
        - batch
      exporters: [otlphttp/loki]
