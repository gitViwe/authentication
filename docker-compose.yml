name: authentication

services:

  auth-api:
    container_name: auth-api
    hostname: auth-api
    restart: on-failure
    build:
      context: src/
      dockerfile: Authentication/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - 5056:8080
    networks:
      - auth-network
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16.3-alpine
    hostname: postgres
    container_name: postgres
    restart: on-failure
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: auth-db
    volumes:
      - postgresqlsystem:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d auth-db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - auth-network

volumes:
  postgresqlsystem:
    
networks:
  auth-network:
    driver: bridge